[SystemSettings]
; Set all scalability groups to High (2 = High, 3 = Epic)
sg.ViewDistanceQuality=2
sg.AntiAliasingQuality=2
sg.ShadowQuality=2
sg.PostProcessQuality=2
sg.TextureQuality=2
sg.EffectsQuality=2
sg.FoliageQuality=2
sg.ShadingQuality=2

; Optional: Disable resolution scaling (keep at 100%)
sg.ResolutionQuality=100

[/Script/Engine.GameUserSettings]
; Prevent auto-detection from lowering settings on first run
; Comment this out if you want the game to auto-detect for low-end PCs
bUseScalabilityHeuristics=False